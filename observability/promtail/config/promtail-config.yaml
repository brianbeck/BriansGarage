server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: synology
    static_configs:
      - targets: [localhost]
        labels:
          job: synology
          host: SantaCruz
          __path__: /host/var/log/*.log

      - targets: [localhost]
        labels:
          job: synology
          host: SantaCruz
          __path__: /host/var/log/messages

      - targets: [localhost]
        labels:
          job: synology
          host: SantaCruz
          __path__: /host/var/log/syslog

      # DSM/Synology logs – focus on files that are actually logs
      - targets: [localhost]
        labels:
          job: synology
          host: SantaCruz
          __path__: /host/var/log/synolog/*.log

      - targets: [localhost]
        labels:
          job: synology
          host: SantaCruz
          __path__: /host/var/log/synolog/synologd.log

    pipeline_stages:
      # Useful label extraction if some logs are JSON; harmless if not JSON
      - json:
          expressions:
            level:
            msg:
            message:
          drop_malformed: false
      - labels:
          level:

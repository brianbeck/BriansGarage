version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9890:9090"
    restart: unless-stopped
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml # Mount the config file
      - ./prometheus/secrets:/etc/prometheus/secrets:ro
    environment:
      - TZ=America/Los_Angeles

  loki:
    image: grafana/loki:latest
    container_name: loki
    #user: "0:0" #loki runs at UI and GID 10001
    command: -config.file=/etc/loki/loki-config.yaml -config.expand-env=true
    ports:
      - "3100:3100"
    restart: unless-stopped
    volumes:
      - ./loki/config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./loki/data:/loki
    environment:
      - TZ=America/Los_Angeles
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    #user: "0:0" # Grafana runs as UID and GID 472
    depends_on:
      - loki
      - prometheus
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    #user: "0:0" #Promtail runs as UID and GID 10001
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    restart: unless-stopped
    volumes:
      - ./promtail/config/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - ./promtail/data:/promtail
      # Mount Synology host logs read-only
      - /var/log:/host/var/log:ro
